<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة توصيل الأدوية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 20px;
        }
        
        .stat-box {
            text-align: center;
        }
        
        .stat-box .number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-box .label {
            font-size: 14px;
            color: #666;
        }
        
        .locations {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .location {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 20px;
            width: 45%;
            text-align: center;
        }
        
        .location h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .truck {
            width: 50px;
            height: 50px;
            background: #667eea;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .truck:hover {
            transform: scale(1.1);
        }
        
        .drugs {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .drug-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .drug-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        
        .drug-item.selected {
            background: #667eea;
            color: white;
        }
        
        .rewards {
            display: flex;
            justify-content: space-around;
        }
        
        .reward {
            text-align: center;
            font-size: 24px;
        }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🚚 لعبة توصيل الأدوية</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div class="number" id="deliveries">0</div>
                <div class="label">توصيلات</div>
            </div>
            <div class="stat-box">
                <div class="number" id="points">0</div>
                <div class="label">نقاط</div>
            </div>
            <div class="stat-box">
                <div class="number" id="reward">⚪</div>
                <div class="label">المكافأة</div>
            </div>
        </div>

        <div class="locations">
            <div class="location" id="warehouse">
                <h3>🏢 المخزن</h3>
            </div>
            <div class="truck" id="truck">🚚</div>
            <div class="location" id="pharmacy">
                <h3>🏥 الصيدلية</h3>
            </div>
        </div>

        <div class="drugs" id="drugsList">
            <div class="drug-item" data-drug="congestal">💊 كونجستال - 30 شريط</div>
            <div class="drug-item" data-drug="paracetamol">💊 باراسيتامول - 50 شريط</div>
            <div class="drug-item" data-drug="amoxicillin">💊 أموكسيسيلين - 20 شريط</div>
            <div class="drug-item" data-drug="brufen">💊 بروفين - 40 شريط</div>
        </div>

        <div class="rewards">
            <div class="reward">🌟 5</div>
            <div class="reward">⭐ 10</div>
            <div class="reward">✨ 15</div>
            <div class="reward">👑 20</div>
        </div>

        <button class="start-btn" id="startBtn">🚀 ابدأ اللعبة</button>
    </div>

    <script>
        let deliveries = 0;
        let points = 0;
        let selectedDrug = null;
        let gameStarted = false;

        const drugsList = document.getElementById('drugsList');
        const truck = document.getElementById('truck');
        const deliveriesSpan = document.getElementById('deliveries');
        const pointsSpan = document.getElementById('points');
        const rewardSpan = document.getElementById('reward');

        // اختيار الدواء
        drugsList.querySelectorAll('.drug-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameStarted) {
                    alert('ابدأ اللعبة أولاً!');
                    return;
                }
                
                drugsList.querySelectorAll('.drug-item').forEach(i => {
                    i.classList.remove('selected');
                });
                this.classList.add('selected');
                selectedDrug = this.dataset.drug;
            });
        });

        // تحريك الشاحنة
        truck.addEventListener('click', function() {
            if (!gameStarted) {
                alert('ابدأ اللعبة أولاً!');
                return;
            }
            
            if (!selectedDrug) {
                alert('اختار دواء أولاً!');
                return;
            }

            // حركة الشاحنة
            this.style.transform = 'translateX(50px)';
            setTimeout(() => {
                this.style.transform = 'translateX(0)';
                deliverDrug();
            }, 500);
        });

        function deliverDrug() {
            deliveries++;
            points += 10;

            // تحديث المكافآت
            let reward = '⚪';
            if (deliveries >= 20) {
                reward = '👑';
                points += 50;
            } else if (deliveries >= 15) {
                reward = '✨';
                points += 30;
            } else if (deliveries >= 10) {
                reward = '⭐';
                points += 20;
            } else if (deliveries >= 5) {
                reward = '🌟';
                points += 10;
            }

            // تحديث العرض
            deliveriesSpan.textContent = deliveries;
            pointsSpan.textContent = points;
            rewardSpan.textContent = reward;

            // رسالة توصيل
            alert(`✅ تم توصيل ${selectedDrug}!\n🎁 كسبت 10 نقاط`);

            // إزالة التحديد
            drugsList.querySelectorAll('.drug-item').forEach(i => {
                i.classList.remove('selected');
            });
            selectedDrug = null;
        }

        // بدء اللعبة
        document.getElementById('startBtn').addEventListener('click', function() {
            gameStarted = true;
            deliveries = 0;
            points = 0;
            deliveriesSpan.textContent = '0';
            pointsSpan.textContent = '0';
            rewardSpan.textContent = '⚪';
            alert('🎮 اللعبة بدأت! اختار دواء واضغط على الشاحنة');
        });
    </script>
</body>
</html>
